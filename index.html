<title>Lock-in Tracker</title>

<style>
  :root {
    --green:#34c759;--green-light:#e8f8ed;--blue:#007aff;--blue-light:#e5f1ff;
    --orange:#ff9500;--red:#ff3b30;--gold:#b8860b;--gold-bg:#fff8d6;--acc:#1a1a1a;
    --bg:#fff;--bg2:#f5f5f7;--bg3:#ebebed;
    --text:#1a1a1a;--text2:#6e6e73;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --f:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
      --green-light:#0d2e18;--blue-light:#0a1f3e;--gold:#e6b800;--gold-bg:#2a2200;}
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;}

  .hdr{padding:.9rem 1rem .7rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .ttl{font-size:20px;font-weight:700;letter-spacing:-.4px;}
  .sub{font-size:12px;color:var(--text2);margin-top:1px;}
  .sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
  .dot.off{background:var(--text2);}.dot.spin{background:var(--orange);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .ps{display:flex;gap:6px;padding:7px 1rem;border-bottom:.5px solid var(--border);align-items:center;}
  .ps-lbl{font-size:12px;color:var(--text2);margin-right:2px;}
  .ps-btn{padding:5px 13px;border-radius:20px;border:.5px solid var(--border2);background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);font-family:var(--f);transition:all .12s;}
  .ps-btn.on{background:var(--acc);color:#fff;border-color:var(--acc);}
  @media(prefers-color-scheme:dark){.ps-btn.on{background:#f2f2f7;color:#1a1a1a;border-color:#f2f2f7;}}

  .stats{display:flex;gap:8px;padding:8px 1rem;border-bottom:.5px solid var(--border);}
  .stat{flex:1;background:var(--bg2);border-radius:9px;padding:7px 10px;}
  .stat-l{font-size:10px;color:var(--text2);margin-bottom:2px;}
  .stat-v{font-size:16px;font-weight:600;}

  .badges{display:flex;gap:5px;flex-wrap:wrap;padding:7px 1rem;border-bottom:.5px solid var(--border);}
  .bdg{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
  .bdg.on{background:var(--gold-bg);color:var(--gold);border:.5px solid var(--gold);}
  .bdg.off{background:var(--bg2);border:.5px solid var(--border);color:var(--text2);}

  /* Grid */
  .grid-wrap{overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .grid{display:grid;grid-template-columns:64px repeat(3,1fr);min-width:0;}

  .ch{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:.5px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:3px;}
  .ch.dc{border-right:.5px solid var(--border);}
  .ch-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .ch-name{font-size:11px;font-weight:600;color:var(--text);}
  .ch-cnt{font-size:10px;color:var(--text2);}

  .month-cell{grid-column:1/-1;background:var(--bg2);padding:4px 10px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);border-bottom:.5px solid var(--border);}

  .date-lbl{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 2px;border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);min-height:52px;}
  .dl-dow{font-size:9px;color:var(--text2);font-weight:500;}
  .dl-num{font-size:13px;font-weight:600;color:var(--text);}
  .date-lbl.we .dl-dow,.date-lbl.we .dl-num{opacity:.45;}
  .date-lbl.td .dl-num{color:var(--blue);font-weight:700;}

  .wcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 2px;border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);min-height:52px;transition:background .1s;}
  .wcell.cl{cursor:pointer;}.wcell.cl:active{opacity:.7;}
  .wcell.we{background:var(--bg2);}.wcell.td{background:var(--blue-light);}.wcell.hw{background:var(--green-light);}
  .ck{width:20px;height:20px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .ck svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .rpe-d{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;}
  .cat-i{font-size:10px;line-height:1;}
  .multi{font-size:8px;font-weight:700;color:var(--green);background:var(--bg);border:1px solid var(--green);border-radius:5px;padding:1px 3px;line-height:1.3;}

  /* Modal */
  .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
  .ov.open{display:flex;}
  .sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:1.1rem 1.1rem 2.5rem;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
  .drag{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto .9rem;}
  .mt{font-size:15px;font-weight:600;margin-bottom:2px;color:var(--text);}
  .msub{font-size:12px;color:var(--text2);margin-bottom:.9rem;}
  .wl{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem;}
  .wr{display:flex;align-items:center;gap:7px;background:var(--bg2);border-radius:9px;padding:7px 9px;}
  .wp{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;flex-shrink:0;}
  .wp.gym{background:#eef;color:#446;}.wp.run{background:#efe;color:#363;}.wp.other{background:#fef;color:#636;}
  @media(prefers-color-scheme:dark){.wp.gym{background:#1a1a3a;color:#99b;}.wp.run{background:#0d2a0d;color:#7b7;}.wp.other{background:#2a1a2a;color:#b8b;}}
  .wrpe{font-size:12px;font-weight:600;flex:1;}
  .wdel{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:0 3px;line-height:1;font-family:var(--f);}
  .empty{font-size:13px;color:var(--text2);text-align:center;padding:.75rem 0;}
  .divl{height:.5px;background:var(--border);margin:.7rem 0;}
  .fl{font-size:11px;font-weight:500;color:var(--text2);display:block;margin-bottom:6px;}
  .cp{display:flex;gap:5px;margin-bottom:.75rem;}
  .cb{flex:1;padding:8px 3px;border-radius:9px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);font-family:var(--f);transition:all .1s;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .cb .ce{font-size:18px;}
  .cb.sgym{border-color:#446;background:#eef;color:#446;}.cb.srun{border-color:#363;background:#efe;color:#363;}.cb.sother{border-color:#636;background:#fef;color:#636;}
  @media(prefers-color-scheme:dark){.cb.sgym{background:#1a1a3a;color:#99b;border-color:#99b;}.cb.srun{background:#0d2a0d;color:#7b7;border-color:#7b7;}.cb.sother{background:#2a1a2a;color:#b8b;border-color:#b8b;}}
  .rp{display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap;}
  .rb{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);font-family:var(--f);}
  .rb.sel{color:#fff;border-color:transparent;}
  .ma{display:flex;gap:7px;}
  .bprim{flex:1;padding:12px;border-radius:11px;background:var(--acc);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--f);}
  .bsec{padding:12px 14px;border-radius:11px;background:var(--bg2);color:var(--text2);border:.5px solid var(--border);font-size:14px;cursor:pointer;font-family:var(--f);}
  @media(prefers-color-scheme:dark){.bprim{background:#f2f2f7;color:#1a1a1a;}}
  .note{font-size:12px;color:var(--text2);padding:8px 1rem;border-top:.5px solid var(--border);}
</style>
</head>
<body>

<div class="hdr">
  <div><div class="ttl">Lock-in Tracker</div><div class="sub">June – August 2026</div></div>
  <div class="sync"><div class="dot off" id="dot"></div><span id="synclbl">Connecting...</span></div>
</div>

<div class="ps">
  <span class="ps-lbl">I am:</span>
  <button class="ps-btn on" onclick="setUser(0)">Linus</button>
  <button class="ps-btn" onclick="setUser(1)">Tobias</button>
  <button class="ps-btn" onclick="setUser(2)">Niklas</button>
</div>

<div class="stats" id="stats"></div>
<div class="badges" id="badges"></div>
<div class="grid-wrap"><div class="grid" id="grid"></div></div>
<div class="note">Tap any cell in your column to log a workout. Changes sync live.</div>

<div class="ov" id="ov" onclick="bgClick(event)">
  <div class="sheet">
    <div class="drag"></div>
    <div class="mt" id="mt"></div>
    <div class="msub" id="msub"></div>
    <div class="wl" id="wl"></div>
    <div class="divl"></div>
    <span class="fl">Category</span>
    <div class="cp">
      <button class="cb" id="cb-gym"   onclick="selCat('gym')"  ><span class="ce">🏋️</span>Gym</button>
      <button class="cb" id="cb-run"   onclick="selCat('run')"  ><span class="ce">🏃</span>Run</button>
      <button class="cb" id="cb-other" onclick="selCat('other')"><span class="ce">⚡</span>Other</button>
    </div>
    <span class="fl">RPE 1–10 (optional)</span>
    <div class="rp" id="rp"></div>
    <div class="ma">
      <button class="bsec" onclick="closeMod()">Done</button>
      <button class="bprim" onclick="addW()">+ Add workout</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  PASTE YOUR SUPABASE CREDENTIALS HERE
// ============================================================
const SUPABASE_URL = 'https://tjvptsblqkirzsljgpup.supabase.co';  // <-- replace
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqdnB0c2JscWtpcnpzbGpncHVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDMxNjksImV4cCI6MjA5NTk3OTE2OX0.pFjR6NPFIIYyDhP2C-5tGMOgmNBkEKeBNOn5F1p8JmA';              // <-- replace
// ============================================================

const PERSONS=[{name:'Linus',l:'L',color:'#007aff',bg:'#e5f1ff'},{name:'Tobias',l:'T',color:'#34c759',bg:'#e8f8ed'},{name:'Niklas',l:'N',color:'#ff9500',bg:'#fff3e0'}];
const MONTHS=[{y:2026,m:5,n:'June'},{y:2026,m:6,n:'July'},{y:2026,m:7,n:'August'}];
const CE={gym:'🏋️',run:'🏃',other:'⚡'};const CL={gym:'Gym',run:'Run',other:'Other'};
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const today=new Date();const TS=`${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
let CU=0,MD=null,SRPE=null,SCAT=null;let db={};

function dbk(pi,k){return `${pi}_${k}`;}
function gw(pi,k){return db[dbk(pi,k)]||[];}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function dow(y,m,d){return (new Date(y,m,d).getDay()+6)%7;}
function ds(y,m,d){return `${y}-${m}-${d}`;}
function rc(v){return !v?'#888':v<=3?'#34c759':v<=5?'#007aff':v<=7?'#ff9500':'#ff3b30';}
function cnt(pi){return Object.entries(db).filter(([k])=>k.startsWith(pi+'_')).reduce((n,[,a])=>n+a.length,0);}

async function sbFetch(path,opts={}){
  return fetch(SUPABASE_URL+path,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});
}
async function loadAll(){
  setSS('spin');
  try{
    const res=await sbFetch('/rest/v1/workouts?select=*');
    if(!res.ok)throw new Error();
    const rows=await res.json();
    db={};rows.forEach(r=>{const k=dbk(r.person_index,r.day_key);if(!db[k])db[k]=[];db[k].push({id:r.id,rpe:r.rpe,cat:r.category});});
    setSS('on');
  }catch(e){setSS('off');}
  render();
}
async function insertW(pi,key,rpe,cat){
  setSS('spin');
  try{
    const res=await sbFetch('/rest/v1/workouts',{method:'POST',body:JSON.stringify({person_index:pi,day_key:key,rpe,category:cat})});
    if(!res.ok)throw new Error();
    const rows=await res.json();const k=dbk(pi,key);if(!db[k])db[k]=[];db[k].push({id:rows[0].id,rpe:rows[0].rpe,cat:rows[0].category});
    setSS('on');
  }catch(e){setSS('off');}
  render();if(MD&&MD.pi===pi&&MD.key===key)refreshList();
}
async function deleteW(id,pi,key){
  setSS('spin');
  try{
    const res=await sbFetch(`/rest/v1/workouts?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':'return=minimal'}});
    if(!res.ok)throw new Error();
    const k=dbk(pi,key);db[k]=(db[k]||[]).filter(w=>w.id!==id);if(!db[k].length)delete db[k];
    setSS('on');
  }catch(e){setSS('off');}
  render();if(MD&&MD.pi===pi&&MD.key===key)refreshList();
}
setInterval(loadAll,30000);
function setSS(s){document.getElementById('dot').className='dot '+(s==='on'?'':s==='spin'?'spin':'off');document.getElementById('synclbl').textContent=s==='on'?'Live':s==='spin'?'Syncing...':'Offline';}

function renderStats(){document.getElementById('stats').innerHTML=PERSONS.map((p,i)=>`<div class="stat"><div class="stat-l">${p.name}</div><div class="stat-v" style="color:${p.color}">${cnt(i)}</div></div>`).join('');}
const BADGES=[
  {e:'▶', l:'First workout',  c:(cc)=>cc[CU]>=1},
  {e:'🥇',l:'10 sessions',   c:(cc)=>cc[CU]>=10},
  {e:'🏆',l:'First to 20!',  c:(cc)=>cc[CU]>=20&&cc.every((v,i)=>i===CU||cc[CU]>=v)},
  {e:'💪',l:'Double day',    c:()=>Object.entries(db).filter(([k])=>k.startsWith(CU+'_')).some(([,a])=>a.length>=2)},
  {e:'🏃',l:'10 runs',       c:()=>catCnt(CU,'run')>=10},
  {e:'🏋️',l:'10 gym',       c:()=>catCnt(CU,'gym')>=10},
];
function catCnt(pi,cat){return Object.entries(db).filter(([k])=>k.startsWith(pi+'_')).reduce((t,[,a])=>t+a.filter(w=>w.cat===cat).length,0);}
function renderBadges(){const cc=PERSONS.map((_,i)=>cnt(i));document.getElementById('badges').innerHTML=BADGES.map(b=>`<div class="bdg ${b.c(cc)?'on':'off'}">${b.e} ${b.l}</div>`).join('');}

function cellHTML(ws){
  if(!ws.length)return'';
  const ck=`<div class="ck"><svg viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg></div>`;
  if(ws.length>1){const cats=[...new Set(ws.map(w=>w.cat).filter(Boolean))];return ck+`<div class="multi">${cats.slice(0,2).map(c=>CE[c]||'⚡').join('')}×${ws.length}</div>`;}
  const w=ws[0];return ck+(w.rpe?`<div class="rpe-d" style="background:${rc(w.rpe)}">${w.rpe}</div>`:'')+( w.cat?`<div class="cat-i">${CE[w.cat]}</div>`:'');
}
function renderGrid(){
  let h='';
  h+=`<div class="ch dc"></div>`;
  PERSONS.forEach((p,pi)=>{h+=`<div class="ch"><div class="ch-av" style="background:${p.bg};color:${p.color}">${p.l}</div><div class="ch-name">${p.name}</div><div class="ch-cnt">${cnt(pi)}</div></div>`;});
  MONTHS.forEach(({y,m,n})=>{
    h+=`<div class="month-cell">${n} ${y}</div>`;
    for(let d=1;d<=dim(y,m);d++){
      const key=ds(y,m,d);const w=dow(y,m,d);const isWe=w===0||w===6;const isTd=key===TS;
      h+=`<div class="date-lbl${isWe?' we':''}${isTd?' td':''}"><div class="dl-dow">${DAYS[w]}</div><div class="dl-num">${d}</div></div>`;
      PERSONS.forEach((_,pi)=>{
        const ws=gw(pi,key);const can=pi===CU;
        let cls='wcell'+(ws.length?' hw':isTd?' td':isWe?' we':'')+(can?' cl':'');
        h+=`<div class="${cls}" ${can?`onclick="openMod(${pi},'${key}')"`:''}>${cellHTML(ws)}</div>`;
      });
    }
  });
  document.getElementById('grid').innerHTML=h;
}
function render(){renderStats();renderBadges();renderGrid();}
function setUser(i){CU=i;document.querySelectorAll('.ps-btn').forEach((b,j)=>b.classList.toggle('on',j===i));render();}

function openMod(pi,key){
  MD={pi,key};SRPE=null;SCAT=null;
  const pts=key.split('-');const dt=new Date(+pts[0],+pts[1],+pts[2]);
  document.getElementById('mt').textContent=PERSONS[pi].name+"'s workouts";
  document.getElementById('msub').textContent=dt.toLocaleDateString('en-SE',{weekday:'long',month:'long',day:'numeric'});
  resetCats();buildRpe();refreshList();
  document.getElementById('ov').classList.add('open');
}
function refreshList(){
  if(!MD)return;const ws=gw(MD.pi,MD.key);const el=document.getElementById('wl');
  if(!ws.length){el.innerHTML='<div class="empty">No workouts logged yet</div>';return;}
  el.innerHTML=ws.map(w=>{const cc=w.cat||'other';return `<div class="wr"><span class="wp ${cc}">${CE[cc]} ${CL[cc]}</span><div class="wrpe" style="color:${rc(w.rpe)}">${w.rpe?'RPE '+w.rpe:'No RPE'}</div><button class="wdel" onclick="deleteW(${w.id},${MD.pi},'${MD.key}')">×</button></div>`;}).join('');
}
function selCat(c){SCAT=c;['gym','run','other'].forEach(x=>{document.getElementById('cb-'+x).className='cb'+(x===c?' s'+x:'');});}
function resetCats(){SCAT=null;['gym','run','other'].forEach(x=>{document.getElementById('cb-'+x).className='cb';});}
function buildRpe(){
  SRPE=null;const rp=document.getElementById('rp');rp.innerHTML='';
  for(let i=1;i<=10;i++){const b=document.createElement('button');b.className='rb';b.textContent=i;b.onclick=()=>{SRPE=i;rp.querySelectorAll('.rb').forEach((btn,j)=>{const v=j+1;btn.classList.toggle('sel',v===i);btn.style.background=v===i?rc(v):'';});};rp.appendChild(b);}
}
function addW(){if(!MD)return;insertW(MD.pi,MD.key,SRPE,SCAT);resetCats();buildRpe();}
function closeMod(){document.getElementById('ov').classList.remove('open');}
function bgClick(e){if(e.target===document.getElementById('ov'))closeMod();}
loadAll();
</script>
</body>
